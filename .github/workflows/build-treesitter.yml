name: Build Tree-sitter Parser

on:
  schedule:
    - cron: "0 0 * * 1"  # Weekly on Monday
  workflow_dispatch:
    inputs:
      ts_version:
        description: "tree-sitter-lf release tag (e.g. v0.0.1). Leave empty to auto-detect latest."
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve version to build
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.ts_version }}" ]; then
            version="${{ inputs.ts_version }}"
          else
            # Get latest release from tree-sitter-lf
            version=$(gh api repos/remifan/tree-sitter-lf/releases \
              --jq '[.[] | select(.prerelease == false)][0].tag_name')
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

          # Check if we already have this release
          tag="ts-${version}"
          if gh release view "$tag" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $tag already exists, skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag not found, will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lf-linux-x64.so
            compile: cc -shared -o lf-linux-x64.so -fPIC -O2 -I./src src/parser.c src/scanner.c
          - os: ubuntu-24.04-arm
            artifact: lf-linux-arm64.so
            compile: cc -shared -o lf-linux-arm64.so -fPIC -O2 -I./src src/parser.c src/scanner.c
          - os: macos-latest
            artifact: lf-darwin-x64.so
            compile: cc -shared -o lf-darwin-x64.so -fPIC -O2 -target x86_64-apple-macos11 -I./src src/parser.c src/scanner.c
          - os: macos-latest
            artifact: lf-darwin-arm64.so
            compile: cc -shared -o lf-darwin-arm64.so -fPIC -O2 -I./src src/parser.c src/scanner.c
          - os: windows-latest
            artifact: lf-win-x64.dll
            compile: gcc -shared -o lf-win-x64.dll -O2 -I./src src/parser.c src/scanner.c
          - os: windows-latest
            artifact: lf-win-arm64.dll
            setup: choco install llvm --params "'/InstallAllUsers'" -y
            compile: clang -shared -o lf-win-arm64.dll -O2 --target=aarch64-pc-windows-msvc -I./src src/parser.c src/scanner.c
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout tree-sitter-lf
        uses: actions/checkout@v4
        with:
          repository: remifan/tree-sitter-lf
          ref: ${{ needs.check.outputs.version }}

      - name: Setup toolchain
        if: matrix.setup
        run: ${{ matrix.setup }}

      - name: Compile parser
        run: ${{ matrix.compile }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree-sitter-lf (for queries)
        uses: actions/checkout@v4
        with:
          repository: remifan/tree-sitter-lf
          ref: ${{ needs.check.outputs.version }}

      - name: Package queries
        run: tar czf queries.tar.gz -C queries .

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          tag="ts-${VERSION}"
          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "Tree-sitter Parser (tree-sitter-lf ${VERSION})" \
            --notes "Pre-built tree-sitter LF parser from [remifan/tree-sitter-lf ${VERSION}](https://github.com/remifan/tree-sitter-lf/releases/tag/${VERSION}).

          ## Usage
          Install directly in Neovim:
          \`\`\`vim
          :LFTSInstall
          \`\`\`" \
            artifacts/* queries.tar.gz
