name: Build LF LSP Server

on:
  schedule:
    - cron: "0 0 * * 1"  # Weekly on Monday
  workflow_dispatch:
    inputs:
      lf_version:
        description: "Lingua Franca release tag (e.g. v0.11.0). Leave empty to auto-detect latest."
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      jar_name: ${{ steps.resolve.outputs.jar_name }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve version to build
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.lf_version }}" ]; then
            version="${{ inputs.lf_version }}"
          else
            version=$(gh api repos/lf-lang/lingua-franca/releases \
              --jq '[.[] | select(.tag_name != "nightly" and .prerelease == false)][0].tag_name')
          fi

          jar_name="lsp-${version#v}-all.jar"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "jar_name=$jar_name" >> "$GITHUB_OUTPUT"

          # Check if this jar already exists in the artifacts release
          existing=$(gh release view artifacts --repo "${{ github.repository }}" --json assets \
            --jq ".assets[].name" 2>/dev/null || true)
          if echo "$existing" | grep -qF "$jar_name"; then
            echo "Asset $jar_name already exists, skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Asset $jar_name not found, will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lingua-franca at release tag
        uses: actions/checkout@v4
        with:
          repository: lf-lang/lingua-franca
          ref: ${{ needs.check.outputs.version }}
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build LSP shadow jar
        run: ./gradlew :lsp:shadowJar

      - name: Rename jar
        run: cp lsp/build/libs/lsp-*-all.jar "${{ needs.check.outputs.jar_name }}"

      - name: Ensure artifacts release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view artifacts --repo "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create artifacts --repo "${{ github.repository }}" \
            --title "Pre-built artifacts" \
            --notes "Pre-built LSP server and tree-sitter parser for lf.nvim.
          These artifacts are built and published automatically by GitHub Actions.

          Install in Neovim:
          \`\`\`vim
          :LFLspInstall
          :LFTSInstall
          \`\`\`"

      - name: Upload jar to artifacts release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload artifacts "${{ needs.check.outputs.jar_name }}" \
            --repo "${{ github.repository }}" --clobber

      - name: Update release title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LSP_VERSION: ${{ needs.check.outputs.version }}
        run: |
          lf_ver=$(gh api repos/${{ github.repository }}/contents/.lf-upstream-version \
            --jq '.content' 2>/dev/null | base64 -d | tr -d '\n' || echo "unknown")
          gh release edit artifacts --repo "${{ github.repository }}" \
            --title "Artifacts for LF ${lf_ver}"
